name: DriveVerse
options:
  bundleIdPrefix: com.praveet
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

# Marks the project as already upgraded so Xcode stops offering its
# "update to recommended settings" dialog (whose direct pbxproj edits a
# regeneration would wipe anyway).
attributes:
  LastUpgradeCheck: "2660"

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES

targets:
  DriveVerse:
    type: application
    platform: iOS
    sources:
      - path: DriveVerse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praveet.driveverse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: DriveVerse/Resources/Info.plist
      properties:
        CFBundleDisplayName: DriveVerse
        NSSupportsLiveActivities: true
        # Lyric lines change every few seconds — without the frequent-updates
        # budget, ActivityKit silently stops rendering updates ~30 s after
        # the app backgrounds while Activity.update keeps getting called.
        NSSupportsLiveActivitiesFrequentUpdates: true
        NSAppleMusicUsageDescription: DriveVerse reads the current Apple Music track to fetch and display synced lyrics. It never plays or modifies your music.
        UIBackgroundModes: [audio]
        CFBundleURLTypes:
          - CFBundleURLName: com.praveet.driveverse.auth
            CFBundleURLSchemes: [driveverse]
        UILaunchScreen: {}
        # iPhone stays portrait-only. The complete ~ipad set satisfies
        # Xcode's "all orientations" check without the deprecated
        # UIRequiresFullScreen key (TN3192); this iPhone-only app runs on
        # iPad only in compatibility mode, where that set never applies.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - target: DriveVerseWidgets
        embed: true

  DriveVerseWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: DriveVerseWidgets
      - path: DriveVerse/LiveActivity/LyricsAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praveet.driveverse.widgets
    info:
      path: DriveVerseWidgets/Info.plist
      properties:
        CFBundleDisplayName: DriveVerse Lyrics
        NSSupportsLiveActivitiesFrequentUpdates: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  DriveVerseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DriveVerseTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: DriveVerse

schemes:
  DriveVerse:
    build:
      targets:
        DriveVerse: all
    run:
      config: Debug
    test:
      targets:
        - DriveVerseTests
